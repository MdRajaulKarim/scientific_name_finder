<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book a Table | ZestyBite</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .booking-container {
            max-width: 600px;
            margin: 50px auto;
            background: var(--color-secondary);
            padding: 40px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><h1>ZestyBite</h1></div>
    <a href="index.html" style="text-decoration:none; color:var(--text-main);">Back to Home</a>
</nav>

<div class="booking-container">
    <h2 class="heading-font">🍽️ Reserve Your Table</h2>
    <p style="color: #666; margin-bottom: 20px;">A minimal booking fee of <strong>₹99</strong> applies (Adjustable in final bill).</p>

    <div class="form-group">
        <label>📅 Select Date</label>
        <input type="date" id="bookingDate" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
    </div>

    <div class="form-group">
        <label>👥 Number of Guests</label>
        <select id="guestCount" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            <option value="2">2 People</option>
            <option value="4">4 People</option>
            <option value="6">6 People</option>
            <option value="8">8+ People (Group)</option>
        </select>
    </div>

    <div class="form-group">
        <label>📝 Special Requests</label>
        <textarea id="specialRequests" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; height: 100px; font-family: inherit; resize: vertical;"></textarea>
    </div>

    <button class="add-btn" onclick="payBookingFee()">💳 PAY ₹99 & RESERVE</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/payment.js"></script>
</body>
</html>
